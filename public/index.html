<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RandomTalk</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0000;
    --surface: #130000;
    --border: #2a0a0a;
    --accent: #8b0000;
    --accent2: #c0392b;
    --accent3: #ff4444;
    --text: #f5e6e6;
    --sub: #7a4a4a;
    --msg-self: #8b0000;
    --msg-other: #1a0505;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    background-image: radial-gradient(ellipse at top, #1a0000 0%, #0a0000 70%);
  }

  /* HOME */
  #homeScreen { text-align: center; animation: fadeUp 0.6s ease both; }

  .logo { font-size: 56px; margin-bottom: 16px; filter: drop-shadow(0 0 20px rgba(139,0,0,0.8)); }

  #homeScreen h1 {
    font-size: 38px;
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent2), var(--accent3));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
    letter-spacing: -0.5px;
  }

  #homeScreen p { color: var(--sub); font-size: 15px; margin-bottom: 40px; }

  .btn-main {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
    border: none;
    border-radius: 50px;
    font-family: 'Inter', sans-serif;
    font-size: 16px;
    font-weight: 600;
    padding: 16px 52px;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 0 30px rgba(139,0,0,0.4);
  }

  .btn-main:hover { transform: translateY(-2px); box-shadow: 0 0 40px rgba(192,57,43,0.5); }

  /* WAITING */
  #waitingScreen { text-align: center; display: none; animation: fadeUp 0.4s ease both; }

  .spinner {
    width: 60px; height: 60px;
    border: 3px solid var(--border);
    border-top-color: var(--accent2);
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin: 0 auto 24px;
  }

  #waitingScreen h2 { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
  #waitingScreen p { color: var(--sub); font-size: 14px; margin-bottom: 32px; }

  .btn-cancel {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--sub);
    border-radius: 50px;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    padding: 10px 28px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-cancel:hover { border-color: var(--accent2); color: var(--text); }

  /* CHAT */
  #chatScreen {
    display: none;
    width: min(620px, 100%);
    height: min(720px, 92vh);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    flex-direction: column;
    overflow: hidden;
    animation: fadeUp 0.4s ease both;
    box-shadow: 0 0 60px rgba(139,0,0,0.2);
  }

  .chat-header {
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(139,0,0,0.05);
  }

  .chat-status { display: flex; align-items: center; gap: 8px; }

  .dot {
    width: 8px; height: 8px;
    background: var(--accent3);
    border-radius: 50%;
    animation: pulse 2s infinite;
    box-shadow: 0 0 6px var(--accent3);
  }

  .dot.offline { background: var(--sub); animation: none; box-shadow: none; }

  .chat-status span { font-size: 14px; font-weight: 500; }

  .btn-next {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--sub);
    border-radius: 20px;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    padding: 6px 16px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-next:hover { border-color: var(--accent2); color: var(--accent3); }

  /* Messages */
  #messages {
    flex: 1; overflow-y: auto;
    padding: 16px;
    display: flex; flex-direction: column; gap: 8px;
    scroll-behavior: smooth;
  }

  #messages::-webkit-scrollbar { width: 3px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg {
    max-width: 78%;
    padding: 10px 14px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.5;
    animation: msgIn 0.2s ease both;
    word-break: break-word;
  }

  .msg.self {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
    align-self: flex-end;
    border-bottom-right-radius: 4px;
  }

  .msg.other {
    background: var(--msg-other);
    color: var(--text);
    align-self: flex-start;
    border-bottom-left-radius: 4px;
    border: 1px solid var(--border);
  }

  .msg.system {
    align-self: center;
    background: transparent;
    color: var(--sub);
    font-size: 12px;
    padding: 4px 14px;
    border: 1px solid var(--border);
    border-radius: 20px;
  }

  .msg img {
    max-width: 100%;
    border-radius: 10px;
    cursor: pointer;
    display: block;
  }

  .msg audio { width: 100%; min-width: 200px; }

  /* Typing indicator */
  #typingIndicator {
    padding: 0 16px 8px;
    font-size: 12px;
    color: var(--sub);
    height: 20px;
    font-style: italic;
  }

  /* Input area */
  .chat-input {
    padding: 12px 14px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }

  .input-actions { display: flex; gap: 6px; align-items: flex-end; }

  .btn-icon {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 10px;
    width: 38px; height: 38px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
    color: var(--sub);
  }

  .btn-icon:hover { border-color: var(--accent2); color: var(--accent3); }
  .btn-icon.recording { border-color: var(--accent3); background: rgba(255,68,68,0.1); animation: pulse 1s infinite; }

  .btn-icon svg { width: 16px; height: 16px; }

  #msgInput {
    flex: 1;
    background: rgba(139,0,0,0.08);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    padding: 10px 14px;
    outline: none;
    resize: none;
    max-height: 100px;
    transition: border-color 0.2s;
  }

  #msgInput:focus { border-color: var(--accent); }
  #msgInput::placeholder { color: var(--sub); }

  .btn-send {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 12px;
    width: 38px; height: 38px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: opacity 0.2s;
    flex-shrink: 0;
    box-shadow: 0 0 12px rgba(139,0,0,0.4);
  }

  .btn-send:hover { opacity: 0.85; }
  .btn-send svg { width: 16px; height: 16px; fill: white; }

  #fileInput { display: none; }

  /* Image lightbox */
  #lightbox {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.9);
    z-index: 100;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }

  #lightbox.show { display: flex; }
  #lightbox img { max-width: 90vw; max-height: 90vh; border-radius: 8px; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
  @keyframes msgIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div id="homeScreen">
  <div class="logo">💬</div>
  <h1>RandomTalk</h1>
  <p>Discute anonymement avec quelqu'un au hasard</p>
  <button class="btn-main" onclick="findPartner()">Trouver quelqu'un</button>
</div>

<div id="waitingScreen">
  <div class="spinner"></div>
  <h2>Recherche en cours...</h2>
  <p>On cherche quelqu'un pour toi 👀</p>
  <button class="btn-cancel" onclick="cancelSearch()">Annuler</button>
</div>

<div id="chatScreen">
  <div class="chat-header">
    <div class="chat-status">
      <div class="dot" id="statusDot"></div>
      <span id="statusText">Connecté avec un inconnu</span>
    </div>
    <button class="btn-next" onclick="nextPerson()">Suivant →</button>
  </div>

  <div id="messages"></div>
  <div id="typingIndicator"></div>

  <div class="chat-input">
    <div class="input-actions">
      <!-- Photo -->
      <button class="btn-icon" onclick="document.getElementById('fileInput').click()" title="Envoyer une photo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/>
          <path d="M21 15l-5-5L5 21"/>
        </svg>
      </button>
      <!-- Vocal -->
      <button class="btn-icon" id="recordBtn" onclick="toggleRecording()" title="Message vocal">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/>
          <path d="M19 10v2a7 7 0 01-14 0v-2M12 19v4M8 23h8"/>
        </svg>
      </button>
    </div>

    <textarea id="msgInput" placeholder="Écris un message..." rows="1"
      onkeydown="handleKey(event)" oninput="autoResize(this); handleTyping()"></textarea>

    <button class="btn-send" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
    </button>
  </div>
</div>

<input type="file" id="fileInput" accept="image/*" onchange="sendImage(this)"/>

<div id="lightbox" onclick="this.classList.remove('show')">
  <img id="lightboxImg" src=""/>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
let typingTimeout = null;
let isTyping = false;
let mediaRecorder = null;
let audioChunks = [];
let recording = false;

function show(id) {
  document.getElementById('homeScreen').style.display = 'none';
  document.getElementById('waitingScreen').style.display = 'none';
  document.getElementById('chatScreen').style.display = 'none';
  const el = document.getElementById(id);
  el.style.display = id === 'chatScreen' ? 'flex' : 'block';
}

function findPartner() {
  show('waitingScreen');
  socket.emit('find');
}

function cancelSearch() {
  socket.emit('leave');
  show('homeScreen');
}

function addMessage(content, type, isImage = false, isAudio = false) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg ${type}`;
  if (isImage) {
    const img = document.createElement('img');
    img.src = content;
    img.onclick = () => {
      document.getElementById('lightboxImg').src = content;
      document.getElementById('lightbox').classList.add('show');
    };
    div.appendChild(img);
  } else if (isAudio) {
    const audio = document.createElement('audio');
    audio.controls = true;
    audio.src = content;
    div.appendChild(audio);
  } else {
    div.textContent = content;
  }
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function sendMessage() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text) return;
  socket.emit('message', text);
  addMessage(text, 'self');
  input.value = '';
  input.style.height = 'auto';
  socket.emit('typing', false);
  isTyping = false;
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

function handleTyping() {
  if (!isTyping) {
    isTyping = true;
    socket.emit('typing', true);
  }
  clearTimeout(typingTimeout);
  typingTimeout = setTimeout(() => {
    isTyping = false;
    socket.emit('typing', false);
  }, 2000);
}

function sendImage(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    const data = e.target.result;
    socket.emit('image', data);
    addMessage(data, 'self', true);
  };
  reader.readAsDataURL(file);
  input.value = '';
}

async function toggleRecording() {
  const btn = document.getElementById('recordBtn');
  if (!recording) {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      mediaRecorder = new MediaRecorder(stream);
      audioChunks = [];
      mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
      mediaRecorder.onstop = () => {
        const blob = new Blob(audioChunks, { type: 'audio/webm' });
        const reader = new FileReader();
        reader.onload = (e) => {
          const data = e.target.result;
          socket.emit('audio', data);
          addMessage(data, 'self', false, true);
        };
        reader.readAsDataURL(blob);
        stream.getTracks().forEach(t => t.stop());
      };
      mediaRecorder.start();
      recording = true;
      btn.classList.add('recording');
      btn.title = 'Arrêter l\'enregistrement';
    } catch {
      alert('Micro non disponible');
    }
  } else {
    mediaRecorder.stop();
    recording = false;
    btn.classList.remove('recording');
    btn.title = 'Message vocal';
  }
}

function nextPerson() {
  socket.emit('leave');
  document.getElementById('messages').innerHTML = '';
  document.getElementById('typingIndicator').textContent = '';
  document.getElementById('statusDot').className = 'dot';
  document.getElementById('statusText').textContent = 'Connecté avec un inconnu';
  findPartner();
}

// Socket events
socket.on('waiting', () => show('waitingScreen'));

socket.on('matched', () => {
  document.getElementById('messages').innerHTML = '';
  document.getElementById('typingIndicator').textContent = '';
  show('chatScreen');
  addMessage('Connecté ! Dis bonjour 👋', 'system');
});

socket.on('message', (data) => addMessage(data.text, 'other'));
socket.on('image', (data) => addMessage(data, 'other', true));
socket.on('audio', (data) => addMessage(data, 'other', false, true));

socket.on('typing', (isTyping) => {
  document.getElementById('typingIndicator').textContent = isTyping ? 'L\'inconnu est en train d\'écrire...' : '';
});

socket.on('partner_left', () => {
  document.getElementById('statusDot').className = 'dot offline';
  document.getElementById('statusText').textContent = 'L\'inconnu est parti';
  document.getElementById('typingIndicator').textContent = '';
  addMessage('L\'inconnu a quitté la conversation', 'system');
});
</script>
</body>
</html>
