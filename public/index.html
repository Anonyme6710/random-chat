<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>RandomTalk</title>
<link rel="manifest" href="/manifest.json"/>
<meta name="theme-color" content="#8b0000"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0000;
    --surface: #130000;
    --border: #2a0a0a;
    --accent: #8b0000;
    --accent2: #c0392b;
    --accent3: #ff4444;
    --text: #f5e6e6;
    --sub: #7a4a4a;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    background-image: radial-gradient(ellipse at top, #1a0000 0%, #0a0000 70%);
    overflow: hidden;
  }

  /* HOME */
  #homeScreen { text-align: center; animation: fadeUp 0.6s ease both; max-width: 420px; width: 100%; }

  .logo { font-size: 56px; margin-bottom: 12px; filter: drop-shadow(0 0 20px rgba(139,0,0,0.8)); }

  #homeScreen h1 {
    font-size: 36px; font-weight: 700;
    background: linear-gradient(135deg, var(--accent2), var(--accent3));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 6px;
  }

  #homeScreen .tagline { color: var(--sub); font-size: 14px; margin-bottom: 32px; }

  .mode-label { font-size: 13px; color: var(--sub); margin-bottom: 12px; letter-spacing: 0.5px; text-transform: uppercase; }

  .mode-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    margin-bottom: 24px;
  }

  .mode-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 10px;
    cursor: pointer;
    transition: all 0.2s;
    color: var(--text);
    font-family: 'Inter', sans-serif;
  }

  .mode-btn:hover, .mode-btn.selected {
    border-color: var(--accent2);
    background: rgba(139,0,0,0.15);
    box-shadow: 0 0 16px rgba(192,57,43,0.2);
  }

  .mode-btn .mode-icon { font-size: 24px; margin-bottom: 6px; }
  .mode-btn .mode-name { font-size: 14px; font-weight: 600; }
  .mode-btn .mode-desc { font-size: 11px; color: var(--sub); margin-top: 2px; }

  .btn-main {
    width: 100%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white; border: none; border-radius: 50px;
    font-family: 'Inter', sans-serif; font-size: 16px; font-weight: 600;
    padding: 15px; cursor: pointer; transition: all 0.2s;
    box-shadow: 0 0 30px rgba(139,0,0,0.4);
  }

  .btn-main:hover { transform: translateY(-2px); box-shadow: 0 0 40px rgba(192,57,43,0.5); }

  /* WAITING */
  #waitingScreen { text-align: center; display: none; animation: fadeUp 0.4s ease both; }

  .spinner {
    width: 60px; height: 60px;
    border: 3px solid var(--border); border-top-color: var(--accent2);
    border-radius: 50%; animation: spin 1s linear infinite;
    margin: 0 auto 24px;
  }

  #waitingScreen h2 { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
  #waitingScreen p { color: var(--sub); font-size: 14px; margin-bottom: 32px; }

  .btn-cancel {
    background: transparent; border: 1px solid var(--border); color: var(--sub);
    border-radius: 50px; font-family: 'Inter', sans-serif; font-size: 14px;
    padding: 10px 28px; cursor: pointer; transition: all 0.2s;
  }

  .btn-cancel:hover { border-color: var(--accent2); color: var(--text); }

  /* CHAT */
  #chatScreen {
    display: none;
    width: min(640px, 100%); height: min(720px, 94vh);
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; flex-direction: column; overflow: hidden;
    animation: fadeUp 0.4s ease both;
    box-shadow: 0 0 60px rgba(139,0,0,0.2);
  }

  .chat-header {
    padding: 12px 16px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(139,0,0,0.05);
  }

  .chat-status { display: flex; align-items: center; gap: 8px; }

  .dot {
    width: 8px; height: 8px; background: var(--accent3);
    border-radius: 50%; animation: pulseDot 2s infinite;
    box-shadow: 0 0 6px var(--accent3);
  }

  .dot.offline { background: var(--sub); animation: none; box-shadow: none; }

  .chat-status span { font-size: 13px; font-weight: 500; }

  .header-right { display: flex; gap: 8px; align-items: center; }

  .room-badge {
    background: rgba(139,0,0,0.2);
    border: 1px solid var(--accent);
    color: var(--accent3);
    border-radius: 20px;
    font-size: 11px;
    padding: 3px 10px;
    font-weight: 600;
  }

  .btn-next {
    background: transparent; border: 1px solid var(--border); color: var(--sub);
    border-radius: 20px; font-family: 'Inter', sans-serif; font-size: 12px;
    padding: 5px 14px; cursor: pointer; transition: all 0.2s;
  }

  .btn-next:hover { border-color: var(--accent2); color: var(--accent3); }

  #messages {
    flex: 1; overflow-y: auto; padding: 14px;
    display: flex; flex-direction: column; gap: 8px; scroll-behavior: smooth;
  }

  #messages::-webkit-scrollbar { width: 3px; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg {
    max-width: 78%; padding: 10px 14px; border-radius: 16px;
    font-size: 14px; line-height: 1.5; animation: msgIn 0.2s ease both; word-break: break-word;
  }

  .msg.self {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white; align-self: flex-end; border-bottom-right-radius: 4px;
  }

  .msg.other {
    background: #1a0505; color: var(--text); align-self: flex-start;
    border-bottom-left-radius: 4px; border: 1px solid var(--border);
  }

  .msg.other-2 {
    background: #0a0a1a; color: var(--text); align-self: flex-start;
    border-bottom-left-radius: 4px; border: 1px solid #1a1a3a;
  }

  .msg.other-3 {
    background: #0a1a0a; color: var(--text); align-self: flex-start;
    border-bottom-left-radius: 4px; border: 1px solid #1a3a1a;
  }

  .msg.system {
    align-self: center; background: transparent; color: var(--sub);
    font-size: 11px; padding: 3px 12px;
    border: 1px solid var(--border); border-radius: 20px;
  }

  .msg img { max-width: 100%; border-radius: 10px; cursor: pointer; display: block; }
  .msg audio { width: 100%; min-width: 180px; }

  .msg-sender { font-size: 10px; color: var(--sub); margin-bottom: 3px; }

  #typingIndicator {
    padding: 0 14px 6px; font-size: 11px; color: var(--sub);
    min-height: 18px; font-style: italic;
  }

  .chat-input {
    padding: 10px 12px; border-top: 1px solid var(--border);
    display: flex; gap: 7px; align-items: flex-end;
  }

  .input-actions { display: flex; gap: 5px; align-items: flex-end; }

  .btn-icon {
    background: transparent; border: 1px solid var(--border); border-radius: 10px;
    width: 36px; height: 36px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; flex-shrink: 0; color: var(--sub);
  }

  .btn-icon:hover { border-color: var(--accent2); color: var(--accent3); }
  .btn-icon.recording { border-color: var(--accent3); background: rgba(255,68,68,0.1); animation: pulseDot 1s infinite; }
  .btn-icon svg { width: 15px; height: 15px; }

  #msgInput {
    flex: 1; background: rgba(139,0,0,0.08); border: 1px solid var(--border);
    border-radius: 12px; color: var(--text); font-family: 'Inter', sans-serif;
    font-size: 14px; padding: 9px 12px; outline: none; resize: none;
    max-height: 100px; transition: border-color 0.2s;
  }

  #msgInput:focus { border-color: var(--accent); }
  #msgInput::placeholder { color: var(--sub); }

  .btn-send {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none; border-radius: 12px; width: 36px; height: 36px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: opacity 0.2s; flex-shrink: 0;
    box-shadow: 0 0 12px rgba(139,0,0,0.4);
  }

  .btn-send:hover { opacity: 0.85; }
  .btn-send svg { width: 15px; height: 15px; fill: white; }

  #fileInput { display: none; }

  #lightbox {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.92); z-index: 100;
    align-items: center; justify-content: center; cursor: pointer;
  }

  #lightbox.show { display: flex; }
  #lightbox img { max-width: 90vw; max-height: 90vh; border-radius: 8px; }

  @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes pulseDot { 0%,100%{opacity:1} 50%{opacity:0.4} }
  @keyframes msgIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
</style>
</head>
<body>

<!-- HOME -->
<div id="homeScreen">
  <div class="logo">💬</div>
  <h1>RandomTalk</h1>
  <p class="tagline">Discute anonymement avec des inconnus</p>

  <div class="mode-label">Combien de personnes ?</div>
  <div class="mode-grid">
    <button class="mode-btn selected" onclick="selectMode(2, this)">
      <div class="mode-icon">👤</div>
      <div class="mode-name">1 vs 1</div>
      <div class="mode-desc">Conversation privée</div>
    </button>
    <button class="mode-btn" onclick="selectMode(3, this)">
      <div class="mode-icon">👥</div>
      <div class="mode-name">Trio</div>
      <div class="mode-desc">3 personnes</div>
    </button>
    <button class="mode-btn" onclick="selectMode(4, this)">
      <div class="mode-icon">👨‍👩‍👧‍👦</div>
      <div class="mode-name">Groupe</div>
      <div class="mode-desc">4 personnes</div>
    </button>
    <button class="mode-btn" onclick="selectMode(0, this)">
      <div class="mode-icon">🌍</div>
      <div class="mode-name">Aléatoire</div>
      <div class="mode-desc">2 à 6 personnes</div>
    </button>
  </div>

  <button class="btn-main" onclick="findPartner()">Trouver des inconnus</button>
</div>

<!-- WAITING -->
<div id="waitingScreen">
  <div class="spinner"></div>
  <h2>Recherche en cours...</h2>
  <p id="waitingDesc">On cherche des inconnus pour toi 👀</p>
  <button class="btn-cancel" onclick="cancelSearch()">Annuler</button>
</div>

<!-- CHAT -->
<div id="chatScreen">
  <div class="chat-header">
    <div class="chat-status">
      <div class="dot" id="statusDot"></div>
      <span id="statusText">Connecté</span>
    </div>
    <div class="header-right">
      <div class="room-badge" id="roomBadge">👤 ×2</div>
      <button class="btn-next" onclick="nextPerson()">Suivant →</button>
    </div>
  </div>

  <div id="messages"></div>
  <div id="typingIndicator"></div>

  <div class="chat-input">
    <div class="input-actions">
      <button class="btn-icon" onclick="document.getElementById('fileInput').click()" title="Photo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="18" height="18" rx="3"/>
          <circle cx="8.5" cy="8.5" r="1.5"/>
          <path d="M21 15l-5-5L5 21"/>
        </svg>
      </button>
      <button class="btn-icon" id="recordBtn" onclick="toggleRecording()" title="Vocal">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/>
          <path d="M19 10v2a7 7 0 01-14 0v-2M12 19v4M8 23h8"/>
        </svg>
      </button>
    </div>

    <textarea id="msgInput" placeholder="Écris un message..." rows="1"
      onkeydown="handleKey(event)" oninput="autoResize(this); handleTyping()"></textarea>

    <button class="btn-send" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
    </button>
  </div>
</div>

<input type="file" id="fileInput" accept="image/*" onchange="sendImage(this)"/>
<div id="lightbox" onclick="this.classList.remove('show')">
  <img id="lightboxImg" src=""/>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
let selectedMode = 2;
let typingTimeout = null;
let isTyping = false;
let mediaRecorder = null;
let audioChunks = [];
let recording = false;
let myIndex = 0;
const typingUsers = {};

const colorClasses = ['other', 'other-2', 'other-3'];
const userColors = {};
let colorIndex = 0;

function getUserClass(id) {
  if (!userColors[id]) {
    userColors[id] = colorClasses[colorIndex % colorClasses.length];
    colorIndex++;
  }
  return userColors[id];
}

function selectMode(mode, btn) {
  selectedMode = mode;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
}

function show(id) {
  ['homeScreen','waitingScreen','chatScreen'].forEach(s => {
    document.getElementById(s).style.display = 'none';
  });
  const el = document.getElementById(id);
  el.style.display = id === 'chatScreen' ? 'flex' : 'block';
}

function findPartner() {
  show('waitingScreen');
  const descs = { 2: 'On cherche 1 inconnu pour toi 👀', 3: 'On cherche 2 inconnus pour toi 👀', 4: 'On cherche 3 inconnus pour toi 👀', 0: 'On cherche un groupe aléatoire 👀' };
  document.getElementById('waitingDesc').textContent = descs[selectedMode] || 'Recherche...';
  socket.emit('find', selectedMode);
}

function cancelSearch() {
  socket.emit('leave');
  show('homeScreen');
}

function addMessage(content, type, isImage = false, isAudio = false, sender = null) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg ${type}`;
  if (sender && type !== 'self' && type !== 'system') {
    const s = document.createElement('div');
    s.className = 'msg-sender';
    s.textContent = sender;
    div.appendChild(s);
  }
  if (isImage) {
    const img = document.createElement('img');
    img.src = content;
    img.onclick = () => { document.getElementById('lightboxImg').src = content; document.getElementById('lightbox').classList.add('show'); };
    div.appendChild(img);
  } else if (isAudio) {
    const audio = document.createElement('audio');
    audio.controls = true; audio.src = content;
    div.appendChild(audio);
  } else {
    const t = document.createElement('span');
    t.textContent = content;
    div.appendChild(t);
  }
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function sendMessage() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text) return;
  socket.emit('message', text);
  addMessage(text, 'self');
  input.value = '';
  input.style.height = 'auto';
  socket.emit('typing', false);
  isTyping = false;
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

function handleTyping() {
  if (!isTyping) { isTyping = true; socket.emit('typing', true); }
  clearTimeout(typingTimeout);
  typingTimeout = setTimeout(() => { isTyping = false; socket.emit('typing', false); }, 2000);
}

function sendImage(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    const data = e.target.result;
    socket.emit('image', data);
    addMessage(data, 'self', true);
  };
  reader.readAsDataURL(file);
  input.value = '';
}

async function toggleRecording() {
  const btn = document.getElementById('recordBtn');
  if (!recording) {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      mediaRecorder = new MediaRecorder(stream);
      audioChunks = [];
      mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
      mediaRecorder.onstop = () => {
        const blob = new Blob(audioChunks, { type: 'audio/webm' });
        const reader = new FileReader();
        reader.onload = (e) => {
          const data = e.target.result;
          socket.emit('audio', data);
          addMessage(data, 'self', false, true);
        };
        reader.readAsDataURL(blob);
        stream.getTracks().forEach(t => t.stop());
      };
      mediaRecorder.start();
      recording = true;
      btn.classList.add('recording');
    } catch { alert('Micro non disponible'); }
  } else {
    mediaRecorder.stop();
    recording = false;
    btn.classList.remove('recording');
  }
}

function updateTypingIndicator() {
  const names = Object.entries(typingUsers).filter(([,v]) => v).map(([id]) => `Inconnu ${id.slice(-3)}`);
  document.getElementById('typingIndicator').textContent = names.length ? names.join(', ') + ' écrit...' : '';
}

function nextPerson() {
  socket.emit('leave');
  document.getElementById('messages').innerHTML = '';
  document.getElementById('typingIndicator').textContent = '';
  Object.keys(userColors).forEach(k => delete userColors[k]);
  colorIndex = 0;
  document.getElementById('statusDot').className = 'dot';
  findPartner();
}

// Socket events
socket.on('waiting', () => show('waitingScreen'));

socket.on('matched', ({ count }) => {
  document.getElementById('messages').innerHTML = '';
  document.getElementById('typingIndicator').textContent = '';
  Object.keys(userColors).forEach(k => delete userColors[k]);
  colorIndex = 0;
  document.getElementById('roomBadge').textContent = `👤 ×${count}`;
  document.getElementById('statusText').textContent = `Connecté avec ${count - 1} inconnu${count > 2 ? 's' : ''}`;
  show('chatScreen');
  addMessage(`${count} personnes connectées — dites bonjour ! 👋`, 'system');
});

socket.on('message', ({ text, from }) => {
  addMessage(text, getUserClass(from), false, false, `Inconnu ${from.slice(-3)}`);
});

socket.on('image', ({ data, from }) => {
  addMessage(data, getUserClass(from), true, false, `Inconnu ${from.slice(-3)}`);
});

socket.on('audio', ({ data, from }) => {
  addMessage(data, getUserClass(from), false, true, `Inconnu ${from.slice(-3)}`);
});

socket.on('typing', ({ id, isTyping }) => {
  typingUsers[id] = isTyping;
  updateTypingIndicator();
});

socket.on('partner_left', () => {
  addMessage('Un inconnu a quitté la conversation', 'system');
});
</script>
</body>
</html>
